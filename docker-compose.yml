services:
  postgres:
    image: postgres:15-alpine
    container_name: fsa-postgres
    env_file: ../.env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - fsa_postgres_data:/var/lib/postgresql/data
    networks:
      - fsa-network
    ports:
      - "5434:5432"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    env_file: ../.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PARENT_DOMAIN=${PARENT_DOMAIN}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PYTHON_SERVICE_URL=http://ai-service:5000
      - GHL_API_KEY=${GHL_API_KEY}
      - GHL_LOCATION_ID=${GHL_LOCATION_ID}
    depends_on:
      - ai-service
    networks:
      - fsa-network
      - cloudflare
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    env_file: ../.env
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=google/gemini-3-flash-preview
    networks:
      - fsa-network
    restart: unless-stopped

networks:
  fsa-network:
    driver: bridge
  cloudflare:
    external: true

volumes:
  fsa_postgres_data: